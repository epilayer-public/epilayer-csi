---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epilayer-csi-node
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: epilayer-csi-node
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, update, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: epilayer-csi-node
subjects:
  - kind: ServiceAccount
    name: epilayer-csi-node
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: epilayer-csi-node
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: epilayer-csi-node
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: epilayer-csi-node
  template:
    metadata:
      labels:
        app: epilayer-csi-node
    spec:
      serviceAccountName: epilayer-csi-node
      priorityClassName: system-node-critical
      containers:
        - name: epilayer-csi
          image: ghcr.io/epilayer-public/epilayer-csi:latest
          args:
            - --endpoint=unix:///csi/csi.sock
            - --mode=node
            - --v=4
          env:
            - name: ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: epilayer-csi
                  key: endpoint
            - name: TOKEN_FILE
              value: /etc/epilayer/token
            - name: REGION
              valueFrom:
                secretKeyRef:
                  name: epilayer-csi
                  key: region
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: token
              mountPath: /etc/epilayer
              readOnly: true
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: device-dir
              mountPath: /dev
            - name: sys-dir
              mountPath: /sys

        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.12.0
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/csi.epilayer.eu/csi.sock
            - --v=4
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.epilayer.eu
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: token
          secret:
            secretName: epilayer-csi
            items:
              - key: token
                path: token
