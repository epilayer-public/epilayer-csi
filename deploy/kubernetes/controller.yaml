---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sagadata-csi-controller
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sagadata-csi-controller
rules:
  # csi-provisioner
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, list, watch, create, delete, patch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, update]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [list, watch, create, update, patch]
  - apiGroups: [storage.k8s.io]
    resources: [csinodes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # csi-attacher
  - apiGroups: [storage.k8s.io]
    resources: [volumeattachments]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [storage.k8s.io]
    resources: [volumeattachments/status]
    verbs: [patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sagadata-csi-controller
subjects:
  - kind: ServiceAccount
    name: sagadata-csi-controller
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: sagadata-csi-controller
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sagadata-csi-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sagadata-csi-controller
  template:
    metadata:
      labels:
        app: sagadata-csi-controller
    spec:
      serviceAccountName: sagadata-csi-controller
      priorityClassName: system-cluster-critical
      containers:
        - name: sagadata-csi
          image: ghcr.io/sagadata-public/sagadata-csi:latest
          args:
            - --endpoint=unix:///csi/csi.sock
            - --mode=controller
            - --v=4
          env:
            - name: ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: sagadata-csi
                  key: endpoint
            - name: TOKEN_FILE
              value: /etc/sagadata/token
            - name: REGION
              valueFrom:
                secretKeyRef:
                  name: sagadata-csi
                  key: region
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: token
              mountPath: /etc/sagadata
              readOnly: true

        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.1.0
          args:
            - --csi-address=/csi/csi.sock
            - --default-fstype=ext4
            - --feature-gates=Topology=true
            - --v=4
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v4.7.0
          args:
            - --csi-address=/csi/csi.sock
            - --v=4
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: token
          secret:
            secretName: sagadata-csi
            items:
              - key: token
                path: token
